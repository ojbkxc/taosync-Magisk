name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Show taoSync source info
        run: |
          cd taosync
          echo "taoSync source from local directory"
          if [ -d ".git" ]; then
            echo "Commit: $(git log --pretty=format:'%h' -1)"
            echo "Branch: $(git branch --show-current)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: taosync/web/package-lock.json

      - name: Build frontend
        working-directory: taosync/web
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/zh-CN.yaml
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/en.yaml
          npm ci
          npm run build
          echo "Frontend built"

      - name: Prepare frontend for packaging
        run: |
          cd taosync
          rm -rf front
          cp -r web/dist front
          test -f front/index.html
          echo "Frontend copied to front/"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build taosync with PyInstaller + StaticX (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$(pwd)/taosync:/app" \
            -w /app \
            arm64v8/python:3.11-slim-bullseye \
            sh -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                zlib1g-dev \
                patchelf \
                binutils \
                zip
              rm -rf /var/lib/apt/lists/*

              python -m pip install --upgrade pip
              python -m pip install setuptools wheel scons hatchling
              python -m pip install --no-build-isolation "pyinstaller>=6,<7" staticx
              python -m pip install -r requirements.txt

              export LD_LIBRARY_PATH="/usr/local/lib:/usr/lib/aarch64-linux-gnu"
              python -m PyInstaller taoSync.spec \
                --distpath /app/dist/arm64 \
                --workpath /app/build/arm64 \
                --noconfirm

              staticx "/app/dist/arm64/taoSync" "/app/dist/arm64/taoSync_StaticX"
              mv -f "/app/dist/arm64/taoSync_StaticX" "/app/dist/arm64/taoSync"
              chmod 755 "/app/dist/arm64/taoSync"
              echo "taoSync built successfully"
            '

      - name: Copy binary to system directory
        run: |
          cp -f taosync/dist/arm64/taoSync system/bin/taosync
          chmod 755 system/bin/taosync
          echo "taoSync binary copied to system/bin/taosync"

      - name: Verify build artifact
        run: |
          if [ ! -f "system/bin/taosync" ]; then
            echo "::error::构建产物 system/bin/taosync 不存在"
            exit 1
          fi
          echo "构建产物验证通过"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-${{ steps.version.outputs.version }}
          path: taoSync-Magisk-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: taoSync Magisk ${{ steps.version.outputs.tag }}
          body: |
            ## taoSync Magisk ${{ steps.version.outputs.version }}

            基于 taoSync 源码编译的 Magisk 模块，开机自启动 taoSync 同步服务。

            ### 功能
            - 开机自启动 taoSync 同步服务
            - 进程守护（崩溃自动重启）
            - Web 管理面板 (端口 8023)
            - 默认密码 `admin`
            - 支持 Magisk v20.4+
            - 基于 PyInstaller + StaticX 编译 (arm64)

            ### 安装
            1. 下载 `taoSync-Magisk-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 重启设备
            4. 浏览器访问 `http://设备IP:8023`

            ### 配置
            - 配置目录：`/data/adb/taosync/data/`
            - 日志文件：`/data/adb/taosync/taosync.log`
          files: taoSync-Magisk-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false