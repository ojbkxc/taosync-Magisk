name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Clone taoSync
        uses: actions/checkout@v4
        with:
          repository: dr34m-cn/taosync
          path: taosync
          ref: main

      - name: Show taoSync commit
        run: |
          cd taosync
          echo "taoSync cloned at commit: $(git log --pretty=format:'%h' -1)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: taosync/web/package-lock.json

      - name: Build frontend
        working-directory: taosync/web
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/zh-CN.yaml
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/en.yaml
          npm ci
          npm run build
          echo "Frontend built"

      - name: Prepare frontend for p4a
        run: |
          cd taosync
          rm -rf front
          cp -r web/dist front
          test -f front/index.html
          echo "Frontend copied to front/"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libsqlite3-dev libbz2-dev libreadline-dev \
            ccache git wget unzip zip \
            openjdk-17-jdk build-essential
          sudo ln -sf "$(which python3)" /usr/bin/python
          echo "ACLOCAL_PATH=/usr/share/aclocal" >> "$GITHUB_ENV"

      - name: Configure Java environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer & python-for-android
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer==1.5.0" "python-for-android==2024.01.21" "Cython==0.29.34" virtualenv
          python -c "import pythonforandroid; print('p4a version:', pythonforandroid.__version__)"

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-v6-p4a2024.01.21-py311-${{ hashFiles('taosync/buildozer.spec', 'taosync/requirements.txt') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v6-p4a2024.01.21-py311-

      - name: Build Android APK with Buildozer
        working-directory: taosync
        run: |
          PYTHONWARNINGS="ignore:Unable to find acceptable character detection:UserWarning" buildozer -v android debug

      - name: Extract Python from APK
        run: |
          cd taosync
          apk_path=$(find bin -maxdepth 1 -name '*.apk' -print -quit)
          if [ -z "$apk_path" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          echo "APK found: $apk_path"

          # Create extraction directory
          mkdir -p ../python_android

          # Extract APK contents
          unzip -q "$apk_path" -d ../python_android

          # Check structure
          ls -la ../python_android

          # Find Python files
          find ../python_android -name "python*" -type f 2>/dev/null | head -20

      - name: Copy python-for-android distribution
        run: |
          # Copy the android_python distribution from .buildozer
          P4A_DIR="$HOME/.buildozer/android/platform/build-arm64-v8a"
          if [ -d "$P4A_DIR" ]; then
            cp -r "$P4A_DIR/dists/taosync__armeabi-v7a" ../python_dist 2>/dev/null || \
            cp -r "$P4A_DIR/dists/taosync__arm64-v8a" ../python_dist 2>/dev/null || \
            cp -r "$P4A_DIR/dists/default" ../python_dist 2>/dev/null
          fi

          # Alternative: copy from buildozer android dist
          BUILDOZER_DIST="$HOME/.buildozer/android/platform/build-arm64-v8a/dists"
          if [ -d "$BUILDOZER_DIST" ]; then
            ls -la "$BUILDOZER_DIST"
            for d in "$BUILDOZER_DIST"/*; do
              if [ -d "$d" ]; then
                echo "Found dist: $d"
                cp -r "$d" ../python_dist
                break
              fi
            done
          fi

          if [ ! -d "../python_dist" ]; then
            echo "ERROR: python_dist not found"
            exit 1
          fi

          ls -la ../python_dist

      - name: Verify build artifact
        run: |
          if [ ! -d "../python_dist" ]; then
            echo "::error::构建产物 python_dist 不存在"
            exit 1
          fi
          echo "构建产物验证通过"

      - name: Copy to Magisk module
        run: |
          # Create module structure
          mkdir -p system/bin
          mkdir -p system/lib/python3.11

          # Copy Python binary
          cp ../python_dist/bin/python3 system/bin/python3.11-android
          chmod 755 system/bin/python3.11-android

          # Copy Python libs
          cp -r ../python_dist/lib/python3.11/site-packages system/lib/python3.11/

          # Copy taosync source
          mkdir -p system/lib/taosync
          cp -r taosync/common system/lib/taosync/
          cp -r taosync/controller system/lib/taosync/
          cp -r taosync/mapper system/lib/taosync/
          cp -r taosync/service system/lib/taosync/
          cp -r taosync/front system/lib/taosync/
          cp -r taosync/locales system/lib/taosync/
          cp taosync/main.py system/lib/taosync/
          cp taosync/requirements.txt system/lib/taosync/

          echo "Files copied to system/"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync/*" \
            -x "python_android/*" \
            -x "python_dist/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-${{ steps.version.outputs.version }}
          path: taoSync-Magisk-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: taoSync Magisk ${{ steps.version.outputs.tag }}
          body: |
            ## taoSync Magisk ${{ steps.version.outputs.version }}

            基于 taoSync 源码编译的 Magisk 模块，开机自启动 taoSync 同步服务。

            ### 功能
            - 开机自启动 taoSync 同步服务
            - 进程守护（崩溃自动重启）
            - Web 管理面板 (端口 8023)
            - 默认密码 `admin`
            - 支持 Magisk v20.4+
            - 基于 python-for-android 编译 (arm64)

            ### 安装
            1. 下载 `taoSync-Magisk-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 重启设备
            4. 浏览器访问 `http://设备IP:8023`

            ### 配置
            - 配置目录：`/data/adb/taosync/data/`
            - 日志文件：`/data/adb/taosync/taosync.log`
          files: taoSync-Magisk-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false