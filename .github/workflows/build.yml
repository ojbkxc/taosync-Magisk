name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

          VERSION=${TAG_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

          echo "Updated to $TAG_VERSION (code: $VERSION_CODE)"

      - name: Download taoSync Linux ARM64 StaticX binary
        run: |
          # 使用源项目的最新 release
          TAOSYNC_VERSION=$(curl -fsSL https://api.github.com/repos/dr34m-cn/taosync/releases/latest | jq -r '.tag_name')
          echo "taoSync version: $TAOSYNC_VERSION"

          # 下载 ARM64 StaticX 版本
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/dr34m-cn/taosync/releases/download/${TAOSYNC_VERSION}/taoSync-${TAOSYNC_VERSION}-linux-StaticX-arm64.zip" \
            -o taosync.zip

          # 解压
          unzip -q taosync.zip
          ls -la

          # 重命名并复制到系统目录
          cp -f taoSync system/bin/taosync
          chmod 755 system/bin/taosync

          echo "taoSync binary ready"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-${{ steps.version.outputs.version }}
          path: taoSync-Magisk-${{ steps.version.outputs.version }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: taoSync Magisk ${{ steps.version.outputs.tag }}
          body: |
            ## taoSync Magisk ${{ steps.version.outputs.version }}

            基于 taoSync 源码编译的 Magisk 模块，开机自启动 taoSync 同步服务。

            ### 功能
            - 开机自启动 taoSync 同步服务
            - 进程守护（崩溃自动重启）
            - Web 管理面板 (端口 8023)
            - 默认密码 `admin`
            - 支持 Magisk v20.4+
            - 基于 taoSync Linux ARM64 StaticX 版本

            ### 安装
            1. 下载 `taoSync-Magisk-${{ steps.version.outputs.version }}.zip`
            2. 通过 Magisk 刷入
            3. 重启设备
            4. 浏览器访问 `http://设备IP:8023`

            ### 配置
            - 配置目录：`/data/adb/taosync/data/`
            - 日志文件：`/data/adb/taosync/taosync.log`
          files: taoSync-Magisk-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false