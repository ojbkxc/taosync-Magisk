name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Clone taoSync
        uses: actions/checkout@v4
        with:
          repository: dr34m-cn/taosync
          path: taosync
          ref: main

      - name: Show taoSync commit
        run: |
          cd taosync
          echo "taoSync cloned at commit: $(git log --pretty=format:'%h' -1)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: taosync/web/package-lock.json

      - name: Build frontend
        working-directory: taosync/web
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/zh-CN.yaml
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/en.yaml
          npm ci
          npm run build
          echo "Frontend built"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build taoSync with PyInstaller + StaticX in Docker
        run: |
          IMG="arm64v8/python:3.11-slim-bullseye"
          LIB="/usr/lib/aarch64-linux-gnu"

          docker run --rm \
            --platform "linux/arm64" \
            -v "$(pwd)/taosync:/app" \
            -w /app \
            -e LIB_PATH="${LIB}" \
            "${IMG}" \
            sh -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                zlib1g-dev \
                patchelf \
                binutils
              rm -rf /var/lib/apt/lists/*

              python -m pip install --upgrade pip
              python -m pip install setuptools wheel scons hatchling
              python -m pip install --no-build-isolation "pyinstaller>=6,<7" staticx
              python -m pip install -r requirements.txt

              export LD_LIBRARY_PATH="/usr/local/lib:${LIB_PATH}"
              python -m PyInstaller taoSync.spec \
                --distpath dist \
                --workpath build \
                --noconfirm

              staticx "dist/taoSync" "dist/taoSync_StaticX"
              mv -f "dist/taoSync_StaticX" "dist/taoSync"
              chmod 755 "dist/taoSync"
            '

      - name: Verify build artifact
        run: |
          if [ ! -f "taosync/dist/taoSync" ]; then
            echo "::error::构建产物 taosync/dist/taoSync 不存在"
            exit 1
          fi
          echo "构建产物验证通过"
          echo "文件类型: $(file taosync/dist/taoSync)"

      - name: Copy binary to Magisk module
        run: |
          cp taosync/dist/taoSync system/bin/taosync
          chmod +x system/bin/taosync
          echo "Binary copied to system/bin/taosync"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}-ci.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-CI
          path: taoSync-Magisk-*-ci.zip