name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Download taoSync Linux ARM64 StaticX binary
        run: |
          TAOSYNC_VERSION=$(curl -fsSL https://api.github.com/repos/dr34m-cn/taosync/releases/latest | jq -r '.tag_name')
          echo "taoSync version: $TAOSYNC_VERSION"

          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/dr34m-cn/taosync/releases/download/${TAOSYNC_VERSION}/taoSync-${TAOSYNC_VERSION}-linux-StaticX-arm64.zip" \
            -o taosync.zip

          unzip -q taosync.zip
          cp -f taoSync system/bin/taosync
          chmod 755 system/bin/taosync

          echo "taoSync binary ready"

      - name: Verify build artifact
        run: |
          if [ ! -f "system/bin/taosync" ]; then
            echo "::error::构建产物 system/bin/taosync 不存在"
            exit 1
          fi
          echo "构建产物验证通过"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}-ci.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-CI
          path: taoSync-Magisk-*-ci.zip