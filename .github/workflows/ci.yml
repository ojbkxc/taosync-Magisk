name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Show taoSync source info
        run: |
          cd taosync
          echo "taoSync source from local directory"
          if [ -d ".git" ]; then
            echo "Commit: $(git log --pretty=format:'%h' -1)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: taosync/web/package-lock.json

      - name: Build frontend
        working-directory: taosync/web
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/zh-CN.yaml
          sed -i "s/__version_placeholder__/$VERSION/g" src/locales/en.yaml
          npm ci
          npm run build
          echo "Frontend built"

      - name: Prepare frontend for packaging
        run: |
          cd taosync
          rm -rf front
          cp -r web/dist front
          test -f front/index.html
          echo "Frontend copied to front/"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build taosync with PyInstaller + StaticX (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$(pwd)/taosync:/app" \
            -w /app \
            arm64v8/python:3.11-slim-bullseye \
            sh -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                zlib1g-dev \
                patchelf \
                binutils \
                zip
              rm -rf /var/lib/apt/lists/*

              python -m pip install --upgrade pip
              python -m pip install setuptools wheel scons hatchling
              python -m pip install --no-build-isolation "pyinstaller>=6,<7" staticx
              python -m pip install -r requirements.txt

              export LD_LIBRARY_PATH="/usr/local/lib:/usr/lib/aarch64-linux-gnu"
              python -m PyInstaller taoSync.spec \
                --distpath /app/dist/arm64 \
                --workpath /app/build/arm64 \
                --noconfirm

              staticx "/app/dist/arm64/taoSync" "/app/dist/arm64/taoSync_StaticX"
              mv -f "/app/dist/arm64/taoSync_StaticX" "/app/dist/arm64/taoSync"
              chmod 755 "/app/dist/arm64/taoSync"
              echo "taoSync built successfully"
            '

      - name: Copy binary to system directory
        run: |
          cp -f taosync/dist/arm64/taoSync system/bin/taosync
          chmod 755 system/bin/taosync
          echo "taoSync binary copied to system/bin/taosync"

      - name: Verify build artifact
        run: |
          if [ ! -f "system/bin/taosync" ]; then
            echo "::error::构建产物 system/bin/taosync 不存在"
            exit 1
          fi
          echo "构建产物验证通过"

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r taoSync-Magisk-${VERSION}-ci.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "taosync/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taoSync-Magisk-CI
          path: taoSync-Magisk-*-ci.zip